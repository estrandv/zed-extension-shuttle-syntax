name = "billboard"
grammar = "jdw_billboarding"
path_suffixes = ["bbd"]
line_comments = ["# "]
brackets = [
    { start = "{", end = "}", close = true, newline = false },
    { start = "[", end = "]", close = true, newline = false },
    { start = "(", end = ")", close = true, newline = false },
    { start = "<", end = ">", close = true, newline = false },
]
